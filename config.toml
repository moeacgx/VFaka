[server]
host = "127.0.0.1"
port = 8080
# IMPORTANT: Set this to your actual domain in production for CORS security
# public_base_url = "https://your-domain.com"

[database]
url = "sqlite:./aff_shop.db?mode=rwc"

[jwt]
